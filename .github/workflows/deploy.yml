name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            set -e
            cd /var/www/dlideas-ecommerce

            # Pull latest code (reset hard to match remote exactly)
            git fetch origin main
            git reset --hard origin/main

            # Install PHP deps (no dev, skip broken post-install script)
            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --no-interaction --no-scripts
            COMPOSER_ALLOW_SUPERUSER=1 composer dump-autoload --no-dev

            # Refresh CI3 system folder if it was removed by git clean or is absent
            if [ ! -d system ]; then
              echo "system/ missing — downloading CI3 3.1.13"
              curl -sL https://github.com/bcit-ci/CodeIgniter/archive/refs/tags/3.1.13.tar.gz \
                | tar xz --strip-components=2 -C . CodeIgniter-3.1.13/system
            fi

            # Fix permissions on writable dirs
            chown -R www-data:www-data application/cache application/logs uploads/products
            chmod -R 775 application/cache application/logs uploads/products

            # Clear CI3 cache
            find application/cache -mindepth 1 ! -name 'index.html' -delete

            # Reload PHP-FPM to pick up any config changes (not restart — zero downtime)
            systemctl reload php8.3-fpm

            echo "Deploy complete."
